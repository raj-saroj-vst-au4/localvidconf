# =============================================================================
# Meet — FRONTEND (Next.js web). Runs on 10.127.1.23 (this host).
# MySQL is on this host (:3306). The media-server runs on 10.127.1.70.
# Bridge networking + 3100->3000 remap because host :3000 is taken by another app.
# Reverse proxy (www.som.iitb.ac.in) must point /meet -> 10.127.1.23:3100
# =============================================================================
services:
  web:
    build:
      context: ..
      dockerfile: packages/web/Dockerfile
    image: meet-web:latest
    container_name: meet-web
    restart: unless-stopped
    env_file: .env.frontend
    ports:
      - "3100:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/meet/api/auth/session"]
      start_period: 20s
      interval: 15s
      timeout: 5s
      retries: 3
