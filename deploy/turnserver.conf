# =============================================================================
# Coturn config for the SPLIT deployment — runs on 10.127.1.70 (host network)
# Internal LAN works out of the box. For EXTERNAL users, see the block at the
# bottom + edge UDP forwarding (the reverse proxy CANNOT carry UDP).
# =============================================================================

listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0

# Relay UDP port range
min-port=49152
max-port=65535

# --- Authentication (TURN REST API / HMAC) ---
# static-auth-secret MUST equal TURN_SECRET in .env.backend, because the
# media-server's /turn-credentials endpoint signs usernames with that value.
use-auth-secret
static-auth-secret=turnsecret123
lt-cred-mech
realm=som.iitb.ac.in

# --- Security ---
no-multicast-peers
no-cli
fingerprint

# Block relaying to private ranges (anti-SSRF) ...
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
# ... but ALLOW the media server itself (mediasoup announces 10.127.1.70),
# otherwise TURN relay to it is rejected.
allowed-peer-ip=10.127.1.70

verbose

# =============================================================================
# EXTERNAL USERS (enable once the public edge forwards UDP/TCP 3478 + the relay
# range to 10.127.1.70, and the client iceServers are wired — see notes):
#   external-ip=103.21.126.128/10.127.1.70
# =============================================================================
